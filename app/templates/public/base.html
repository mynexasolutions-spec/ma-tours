<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}M.A. Tours & Travels | Premium Kashmir Packages{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Experience the paradise of Kashmir with M.A. Tours & Travels. Discover premium honeymoon, adventure, and family packages.{% endblock %}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Custom Styles (Imports Fonts & Configures Tailwind Theme) -->
    <style type="text/tailwindcss">
        @theme {
          --font-sans: 'Outfit', sans-serif;
          --font-serif: 'Oswald', sans-serif;
          
          --color-primary-50: #f0fdfa;
          --color-primary-100: #ccfbf1;
          --color-primary-200: #99f6e4;
          --color-primary-300: #5eead4;
          --color-primary-400: #2dd4bf;
          --color-primary-500: #14b8a6;
          --color-primary-600: #0d9488;
          --color-primary-700: #0f766e;
          --color-primary-800: #115e59;
          --color-primary-900: #134e4a;
        }

        /* Base Styles */
        body {
          font-family: var(--font-sans);
        }

        .heading-serif {
          font-family: var(--font-serif);
        }

        /* Utilities */
        .glass-nav {
          background-color: rgba(255, 255, 255, 0.8);
          backdrop-filter: blur(12px);
          border-bottom: 1px solid #f3f4f6;
        }

        .btn {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          padding: 0.75rem 1.5rem;
          font-weight: 500;
          border-radius: 9999px;
          transition: all 0.3s ease;
        }

        .btn-primary {
          background-color: var(--color-primary-600);
          color: white;
          box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-primary:hover {
          background-color: var(--color-primary-700);
          transform: translateY(-2px);
          box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Fade in animation for page load */
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
          animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
    
    <!-- Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen text-gray-800 bg-white antialiased">

    {% include 'public/partials/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-grow {% if not is_transparent_nav %}pt-24{% endif %} {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% include 'public/partials/footer.html' %}

    <!-- Vue App Initialization for Layout -->
    <script>
        const { createApp, ref, onMounted, onUnmounted } = Vue;
        
        // This app controls the layout layer (Navbar scrolling, mobile menu)
        const layoutApp = createApp({
            delimiters: ['${', '}'],
            setup() {
                const isScrolled = ref(false);
                const isMobileMenuOpen = ref(false);
                
                // Block level variable to determine if navbar should be transparent initially
                // This will be injected by Jinja
                const isTransparentPage = ref({{ 'true' if is_transparent_nav else 'false' }});

                const handleScroll = () => {
                    isScrolled.value = window.scrollY > 20;
                };

                onMounted(() => {
                    window.addEventListener('scroll', handleScroll);
                    handleScroll(); // Check initial state
                });

                onUnmounted(() => {
                    window.removeEventListener('scroll', handleScroll);
                });

                return {
                    isScrolled,
                    isMobileMenuOpen,
                    isTransparentPage
                }
            }
        });
        
        layoutApp.mount('#navbar-app');
    </script>
    
    <!-- Specific page Vue apps can be mounted in this block -->
    {% block extra_scripts %}{% endblock %}
</body>
</html>
