<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO defaults -->
    <title>{% block title %}M A Tours & Travels{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Discover amazing travel packages with M A Tours & Travels. Domestic, international, honeymoon, family, and group tours.{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo-svg.svg') }}">
    <link rel="alternate icon" type="image/png" href="{{ url_for('static', filename='logo-transparent.png') }}">

    <!-- Tailwind CSS v4 (CDN for development) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts — Inter for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- Page-specific CSS -->
    {% block extra_css %}{% endblock %}

    <!-- Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                            950: '#172554',
                        },
                        accent: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                            800: '#9a3412',
                            900: '#7c2d12',
                        },
                    },
                },
            },
        }
    </script>
</head>
<body class="font-sans antialiased text-gray-800 bg-white">

    {% block content %}{% endblock %}

    <!-- Vue.js 3 (CDN for development) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- Page-specific JS -->
    {% block extra_js %}{% endblock %}

</body>
</html>
